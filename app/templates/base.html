<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TinyAnim — Lossless Lottie &amp; SVG Compression{% endblock %}</title>
  <meta name="description" content="Shrink Lottie (JSON) and SVG files by up to 80% with zero visible quality loss." />
  <style>
    :root {
      --bg: #08090c; --bg-elev: #0f1117; --card: #12141c;
      --border: rgba(255,255,255,.08); --border-strong: rgba(255,255,255,.16);
      --text: #f4f5f7; --text-dim: #8b909c; --text-faint: #5a5f6b;
      --accent: #6d5efc; --accent-2: #00d8c2; --accent-glow: rgba(109,94,252,.45);
      --good: #2fe07a; --warn: #ffb020; --radius: 18px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased; line-height: 1.5; overflow-x: hidden; }
    body::before { content:""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(900px 500px at 50% -10%, rgba(109,94,252,.16), transparent 60%),
                  radial-gradient(700px 500px at 90% 10%, rgba(0,216,194,.08), transparent 55%); }
    a { color: inherit; }
    .nav { position: relative; z-index: 2; max-width: 980px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; padding: 22px 24px; }
    .brand { font-weight: 700; letter-spacing: -.02em; font-size: 18px; text-decoration: none; display:flex; align-items:center; gap:8px; }
    .brand .logo { width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 4px 14px -3px var(--accent-glow); }
    .nav-right { display: flex; align-items: center; gap: 16px; font-size: 14px; }
    .nav-right a { color: var(--text-dim); text-decoration: none; }
    .nav-right a:hover { color: var(--text); }
    .btn { display:inline-flex; align-items:center; gap:8px; border:none; cursor:pointer;
      font-family: var(--font); font-size: 14px; font-weight: 600; color:#fff; text-decoration:none;
      padding: 9px 16px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), #8b7dff);
      box-shadow: 0 8px 24px -8px var(--accent-glow); transition: transform .15s, filter .2s; }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
    .btn.ghost { background: var(--bg-elev); border: 1px solid var(--border); box-shadow: none; color: var(--text); }
    .pill { font-size: 11px; font-weight: 700; letter-spacing:.05em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 999px; }
    .pill.free { background: rgba(255,255,255,.08); color: var(--text-dim); }
    .pill.pro { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; }
    .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 36px 24px 64px; }
    footer { margin-top: 56px; text-align: center; color: var(--text-faint); font-size: 12px; }
    footer a { color: var(--text-dim); text-decoration: none; }
    {% block style %}{% endblock %}
  </style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/"><span class="logo"></span> TinyAnim</a>
    <div class="nav-right">
      {% if user %}
        <span class="pill {{ 'pro' if plan.key == 'pro' else 'free' }}">{{ plan.name }}</span>
        <a href="/account">Account</a>
        <form action="/auth/logout" method="post" style="display:inline"><button class="btn ghost" type="submit">Sign out</button></form>
      {% else %}
        <a href="#pricing">Pricing</a>
        <a class="btn" href="/login">Sign in</a>
      {% endif %}
    </div>
  </nav>
  {% block body %}{% endblock %}
  <footer>
    Built for designers &amp; engineers who care about milliseconds. ·
    <a href="/api/stats">stats API</a> · <a href="https://github.com/NagaYu/TinyAnim-v2">GitHub</a>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
