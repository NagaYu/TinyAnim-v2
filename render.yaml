# Render Blueprint — one-click deploy of TinyAnim (web service + Postgres).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tinyanim
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: TINYANIM_ENV
        value: production
      # Auto-generated, stable secret for signing cookies & magic-link tokens.
      - key: TINYANIM_SECRET_KEY
        generateValue: true
      - key: TINYANIM_COOKIE_SECURE
        value: "true"
      # Set to your Render URL after first deploy, e.g. https://tinyanim.onrender.com
      - key: TINYANIM_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tinyanim-db
          property: connectionString
      # ---- Email (magic links) — set to enable real delivery ----
      - key: RESEND_API_KEY
        sync: false
      - key: TINYANIM_EMAIL_FROM
        sync: false
      # ---- Stripe (subscriptions) — start with test keys ----
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: tinyanim-db
    plan: free
